app = "drcrop-demo"
primary_region = "sjc"

[build]

[env]
  PORT = "8080"
  DRCROP_GBRAIN = "0"
  DRCROP_AGRONOMIST_MODEL = "claude-sonnet-4-6"
  ZEROENTROPY_RERANK_MODEL = "zerank-2"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 80
    hard_limit = 120

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "get"
  timeout = "5s"
  path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
